name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string
      build_toolbox:
        description: 'Build toolbox'
        required: false
        type: boolean
        default: false
      build_jackcom:
        description: 'Build jackcom'
        required: false
        type: boolean
        default: false
      build_jacc:
        description: 'Build jacc'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        app: [toolbox, jackcom, jacc]

    steps:
      - name: Check if app should build
        id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            case "${{ matrix.app }}" in
              toolbox) echo "should_build=${{ inputs.build_toolbox }}" >> $GITHUB_OUTPUT ;;
              jackcom) echo "should_build=${{ inputs.build_jackcom }}" >> $GITHUB_OUTPUT ;;
              jacc) echo "should_build=${{ inputs.build_jacc }}" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Checkout
        if: steps.check.outputs.should_build == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.check.outputs.should_build == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.check.outputs.should_build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        if: steps.check.outputs.should_build == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: steps.check.outputs.should_build == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/${{ matrix.app }}/src-tauri -> target

      - name: Install dependencies
        if: steps.check.outputs.should_build == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: pnpm --filter @app/${{ matrix.app }} tauri build

      - name: Upload Release Assets
        if: steps.check.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
          name: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
          draft: false
          prerelease: false
          files: |
            packages/${{ matrix.app }}/src-tauri/target/release/bundle/nsis/*-setup.exe
            packages/${{ matrix.app }}/src-tauri/target/release/bundle/msi/*.msi

      - name: Publish software info to rustserver
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        env:
          RUSTSERVER_URL: ${{ secrets.RUSTSERVER_URL }}
          RUSTSERVER_TOKEN: ${{ secrets.RUSTSERVER_TOKEN }}
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        run: |
          if [ -z "$RUSTSERVER_URL" ] || [ -z "$RUSTSERVER_TOKEN" ]; then
            echo "RUSTSERVER_URL or RUSTSERVER_TOKEN not set, skipping publish"
            exit 0
          fi

          VERSION="${TAG#v}"
          APP="${{ matrix.app }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/"

          # 查找实际文件名
          EXE_FILE=$(ls packages/${APP}/src-tauri/target/release/bundle/nsis/*-setup.exe 2>/dev/null | head -1)
          if [ -n "$EXE_FILE" ]; then
            FILENAME=$(basename "$EXE_FILE")
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${FILENAME}"
          fi

          curl -sf -X POST "${RUSTSERVER_URL}/api/publish/github" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${RUSTSERVER_TOKEN}" \
            -d "{
              \"name\": \"${APP}\",
              \"version\": \"${VERSION}\",
              \"downloadUrl\": \"${DOWNLOAD_URL}\",
              \"display\": \"${APP}\",
              \"identifier\": \"com.jackit.${APP}\"
            }" && echo "Published ${APP} ${VERSION} to rustserver" || echo "Publish failed (non-blocking)"
