name: Build Jacc

on:
  push:
    tags:
      - 'jacc-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: ./.github/actions/build-tauri
        with:
          app-name: jacc
          jackserver-url: ${{ secrets.JACKIT_JACKSERVER_URL }}
          jackserver-token: ${{ secrets.JACKIT_JACKSERVER_TOKEN }}
