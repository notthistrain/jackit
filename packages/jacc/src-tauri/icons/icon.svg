<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Background: rounded square with gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="gear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Gear icon (settings) -->
  <g transform="translate(128,128)">
    <!-- Outer gear teeth -->
    <path d="M0,-72 L8,-72 L12,-60 L18,-58 L28,-66 L34,-60 L26,-50 L28,-44 L40,-40 L40,-32 L28,-28 L26,-22 L34,-12 L28,-6 L18,-14 L12,-12 L8,0 L0,0" fill="url(#gear)" opacity="0.9"/>
    <path d="M0,-72 L-8,-72 L-12,-60 L-18,-58 L-28,-66 L-34,-60 L-26,-50 L-28,-44 L-40,-40 L-40,-32 L-28,-28 L-26,-22 L-34,-12 L-28,-6 L-18,-14 L-12,-12 L-8,0 L0,0" fill="url(#gear)" opacity="0.9"/>
    <!-- Simplified gear shape -->
  </g>
  <!-- Letter J with config bracket style -->
  <text x="128" y="172" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">J</text>
  <!-- Small dots representing config -->
  <circle cx="80" cy="80" r="6" fill="white" opacity="0.6"/>
  <circle cx="176" cy="80" r="6" fill="white" opacity="0.6"/>
  <circle cx="80" cy="176" r="6" fill="white" opacity="0.4"/>
</svg>
