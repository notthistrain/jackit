[package]
name = "jackserver"
version = "0.1.0"
edition = "2021"

[lib]
name = "jackserver"
path = "src/lib.rs"

[features]
default = []
test-utils = []

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"

[dev-dependencies]
tempfile = "3"
tower = "0.5"

[[test]]
name = "api_test"
required-features = ["test-utils"]
