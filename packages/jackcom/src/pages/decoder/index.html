<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JackCom — Decoder</title>
  <style>
    body { margin: 0; background: #1e1e1e; }
    @keyframes sk-pulse { 0%,100%{opacity:.25}50%{opacity:.1} }
    .sk { background: #3c3c3c; border-radius: 2px; animation: sk-pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root">
    <div style="height:100vh;display:flex;flex-direction:column;font-family:Consolas,'Courier New',monospace;color:#d4d4d4">
      <!-- Header -->
      <div style="height:28px;background:#323233;border-bottom:1px solid #3c3c3c;display:flex;align-items:center;padding:0 10px;gap:8px">
        <div class="sk" style="width:120px;height:12px"></div>
      </div>
      <!-- Frame detail -->
      <div style="flex:1;padding:10px">
        <div class="sk" style="width:100px;height:16px;margin-bottom:12px"></div>
        <div class="sk" style="width:80%;height:12px;margin-bottom:8px"></div>
        <div class="sk" style="width:65%;height:12px;margin-bottom:8px"></div>
        <div class="sk" style="width:90%;height:12px;margin-bottom:8px"></div>
        <div class="sk" style="width:50%;height:12px"></div>
      </div>
      <!-- Toolbar -->
      <div style="height:26px;background:#252526;border-top:1px solid #3c3c3c;display:flex;align-items:center;padding:0 10px;gap:12px">
        <div class="sk" style="width:50px;height:14px"></div>
        <div class="sk" style="width:60px;height:14px"></div>
      </div>
    </div>
  </div>
  <script type="module" src="./decoder.tsx"></script>
</body>
</html>
