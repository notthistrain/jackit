<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JackCom — History</title>
  <style>
    body { margin: 0; background: #1e1e1e; }
    @keyframes sk-pulse { 0%,100%{opacity:.25}50%{opacity:.1} }
    .sk { background: #3c3c3c; border-radius: 2px; animation: sk-pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root">
    <div style="height:100vh;display:flex;font-family:Consolas,'Courier New',monospace;color:#d4d4d4">
      <!-- Session list -->
      <div style="width:200px;background:#252526;border-right:1px solid #3c3c3c;display:flex;flex-direction:column">
        <div style="height:26px;border-bottom:1px solid #3c3c3c;padding:0 10px;display:flex;align-items:center">
          <div class="sk" style="width:50px;height:10px"></div>
        </div>
        <div style="padding:6px">
          <div class="sk" style="width:100%;height:20px;margin-bottom:4px"></div>
          <div class="sk" style="width:100%;height:20px;margin-bottom:4px"></div>
          <div class="sk" style="width:100%;height:20px"></div>
        </div>
      </div>
      <!-- Frame table -->
      <div style="flex:1;display:flex;flex-direction:column">
        <!-- FilterBar -->
        <div style="height:28px;border-bottom:1px solid #3c3c3c;display:flex;align-items:center;padding:0 10px;gap:8px">
          <div class="sk" style="width:60px;height:14px"></div>
          <div class="sk" style="width:60px;height:14px"></div>
        </div>
        <div style="flex:1;padding:4px 10px">
          <div class="sk" style="width:100%;height:16px;margin-bottom:6px"></div>
          <div class="sk" style="width:100%;height:16px;margin-bottom:6px"></div>
          <div class="sk" style="width:100%;height:16px;margin-bottom:6px"></div>
          <div class="sk" style="width:100%;height:16px;margin-bottom:6px"></div>
          <div class="sk" style="width:100%;height:16px"></div>
        </div>
        <!-- Status bar -->
        <div style="height:22px;background:#252526;border-top:1px solid #3c3c3c;display:flex;align-items:center;padding:0 10px">
          <div class="sk" style="width:80px;height:8px"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./history.tsx"></script>
</body>
</html>
